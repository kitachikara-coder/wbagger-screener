name: screen

on:
  schedule:
    # 月〜金 09:30 UTC = 月〜金 18:30 JST（当日夕方・データ更新後）
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}   # 手動実行ボタン

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "screening update ($(TZ=Asia/Tokyo date +%Y-%m-%d))"
            git push
          fi
